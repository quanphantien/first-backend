name: Backend Continuous Integration & Package

on:
  push:
    branches: [ "main" ] # Triggers instantly when code is merged into main

jobs:
  # ==========================================
  # STAGE 1: Code Quality Gate
  # ==========================================
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Matches your FastAPI local/container environment
          cache: 'pip'          # Optimizes package layer downloads

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Optional: Runs code validation checks if you have flake8/black configured
      - name: Lint and Format Audit
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # ==========================================
  # STAGE 2: Build and Push Container Images
  # ==========================================
  build-and-push-backend:
    needs: lint-and-test # Blocks execution instantly if code checks fail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Authenticate with Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry (ACR)
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_REGISTRY_SERVER }}
          username: ${{ secrets.DOCKER_REGISTRY_SERVER_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_SERVER_PASSWORD }}

      # Compiles ONE backend image, applying the dual-tag pattern
      - name: Compile and Tag Backend Container
        run: |
          docker build \
            -t ${{ secrets.AZURE_REGISTRY_SERVER }}/first-backend:${{ github.sha }} \
            -t ${{ secrets.AZURE_REGISTRY_SERVER }}/first-backend:latest .
          
          docker push ${{ secrets.AZURE_REGISTRY_SERVER }}/first-backend:${{ github.sha }}
          docker push ${{ secrets.AZURE_REGISTRY_SERVER }}/first-backend:latest

  # ==========================================
  # STAGE 3: GitOps Trigger Handshake
  # ==========================================
  trigger-iac-rollout:
    needs: build-and-push-backend
    runs-on: ubuntu-latest
    steps:
      - name: Emit Repository Dispatch Signal to IaC Repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_ACCESS_TOKEN }}
          repository: quanphantien/infrastructure # Target your central IaC repo
          event-type: rollout-new-backend            # The custom event tag
          client-payload: '{"tag": "${{ github.sha }}"}' # Sends the unique commit hash